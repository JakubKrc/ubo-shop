# Translate X-Forwarded-Proto from the upstream nginx into the standard
# HTTPS=on env var that PrestaShop / Symfony's Request::isSecure() reads.
# Without this, PrestaShop admin shows "SSL is activated, please log in to
# secure mode" even when the user IS on HTTPS, because the container itself
# only sees plain HTTP from the reverse proxy.
SetEnvIf X-Forwarded-Proto ^https$ HTTPS=on
